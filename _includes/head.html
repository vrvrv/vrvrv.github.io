<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>
    {%- if page.title -%}
      {{ page.title }}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}
  </title>

  {%-seo title=false-%}
  {%-feed_meta-%}

  <link rel="shortcut icon" type="image/x-icon" href="{{ site.favicon | relative_url }}" />
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.css" integrity="sha384-OH8qNTHoMMVNVcKdKewlipV4SErXqccxxlg6HC9Cwjr5oZu2AdBej1TndeCirael" crossorigin="anonymous">

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const isDark = document.body.getAttribute('a') === 'dark' ||
        (document.body.getAttribute('a') === 'auto' &&
         window.matchMedia('(prefers-color-scheme: dark)').matches);
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark ? 'dark' : 'neutral',
        fontSize: 12,
        flowchart: { useMaxWidth: true, nodeSpacing: 20, rankSpacing: 30 },
        sequence: { useMaxWidth: true, noteMargin: 8, messageMargin: 30 }
      });
      mermaid.run({ nodes: document.querySelectorAll('.mermaid, .mermaid-wide') });
    });
  </script>
  <style>
    .mermaid { font-size: 12px; overflow-x: auto; }
    .mermaid svg { max-height: 600px; }
    .mermaid-wide { font-size: 13px; overflow-x: auto; }
    .mermaid-wide svg { max-height: none; width: 100%; }

    /* Floating TOC */
    .floating-toc {
      position: fixed;
      top: 2rem;
      right: 1rem;
      max-width: 260px;
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      font-size: 0.75em;
      line-height: 1.5;
      z-index: 100;
      padding: 0.8rem;
      border-left: 2px solid #ddd;
    }
    .floating-toc ul { list-style: none; padding: 0; margin: 0; }
    .floating-toc li { margin: 0.2rem 0; }
    .floating-toc li.toc-h3 { padding-left: 0.8rem; }
    .floating-toc li.toc-h4 { padding-left: 1.6rem; }
    .floating-toc a { color: #888; text-decoration: none; }
    .floating-toc a:hover { color: #333; }
    .floating-toc a.active { color: #000; font-weight: bold; }
    @media (max-width: 1200px) { .floating-toc { display: none; } }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const headings = document.querySelectorAll('h2[id], h3[id], h4[id]');
      if (headings.length === 0) return;
      const toc = document.createElement('nav');
      toc.className = 'floating-toc';
      const ul = document.createElement('ul');
      headings.forEach(function(h) {
        const li = document.createElement('li');
        li.className = 'toc-' + h.tagName.toLowerCase();
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.replace(/^[\d.]+\s*/, '').substring(0, 40);
        li.appendChild(a);
        ul.appendChild(li);
      });
      toc.appendChild(ul);
      document.body.appendChild(toc);

      const links = toc.querySelectorAll('a');
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            links.forEach(function(l) { l.classList.remove('active'); });
            const active = toc.querySelector('a[href="#' + entry.target.id + '"]');
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '0px 0px -70% 0px', threshold: 0 });
      headings.forEach(function(h) { observer.observe(h); });
    });
  </script>

</head>
